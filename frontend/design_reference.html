<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPilot — ابدأ رحلتك المهنية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#D3A0FD;
    --secondary:#E8CFFF;
    --purple-light:#F7F0FD;
    --accent:#ECFF70;
    --accent-light:#F8FFD9;
    --background:#FAFAFA;
    --text:#111111;
    --white:#FFFFFF;
    --border:#ECECEC;
    --text-secondary:#5F5F5F;
    --text-muted:#8D8D8D;
    --success:#8ED081;
    --warning:#F7C948;
    --error:#FF6B6B;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Almarai', sans-serif; background:var(--background); color:var(--text); min-height:100vh; }
  h1,.display{ font-family:'Cairo', sans-serif; }

  .app{ display:flex; min-height:100vh; position:relative; overflow-x:hidden; }

  .blob{
    position:absolute; border-radius:50%; pointer-events:none; z-index:0;
    background: radial-gradient(circle at 35% 35%, var(--secondary), var(--purple-light) 72%);
    width:460px; height:460px; top:-160px; left:22%; opacity:.55;
  }
  @media (prefers-reduced-motion:no-preference){
    .blob{ animation: drift 18s ease-in-out infinite alternate; }
  }
  @keyframes drift{ from{ transform:translate(0,0); } to{ transform:translate(-16px,18px); } }

  /* ============ SIDEBAR ============ */
  aside{
    width:264px; flex-shrink:0; background:var(--white); border-left:1px solid var(--border);
    display:flex; flex-direction:column; justify-content:space-between; padding:26px 20px;
    position:relative; z-index:2;
  }
  .brand{ display:flex; align-items:center; gap:10px; padding:0 4px 26px 4px; }
  .brand-mark{
    width:34px; height:34px; border-radius:10px;
    background:linear-gradient(135deg, var(--primary), var(--secondary));
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand-mark svg{ width:18px; height:18px; }
  .brand-name{ font-family:'Cairo'; font-weight:800; font-size:17px; }

  nav{ display:flex; flex-direction:column; gap:2px; }
  .nav-item{
    display:flex; align-items:center; justify-content:space-between; padding:12px 12px; border-radius:12px;
    color:var(--text-secondary); font-size:14.5px; text-decoration:none; cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .nav-item .nav-left{ display:flex; align-items:center; gap:10px; }
  .nav-item svg{ width:18px; height:18px; opacity:.75; flex-shrink:0; }
  .nav-item:hover{ background:var(--purple-light); color:var(--text); }
  .nav-item:focus-visible{ outline:2px solid var(--primary); outline-offset:2px; }
  .nav-item.active{ background:var(--purple-light); color:var(--text); font-weight:700; }
  .nav-item.active svg{ opacity:1; }
  .active-dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }

  /* light progress card */
  .progress-card{
    border:1px solid var(--border); border-radius:16px; padding:16px;
    background:var(--purple-light);
  }
  .progress-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .progress-top .label{ font-size:12.5px; font-weight:700; color:var(--text); }
  .progress-top .count{ font-family:'Cairo'; font-weight:800; font-size:13px; color:var(--primary); }
  .progress-sub{ font-size:11.5px; color:var(--text-muted); margin-bottom:12px; line-height:1.5; }
  .progress-track{ height:8px; border-radius:999px; background:var(--white); overflow:hidden; }
  .progress-fill{ height:100%; width:4%; border-radius:999px; background:linear-gradient(90deg, var(--primary), var(--accent)); }

  /* ============ MAIN ============ */
  main{ flex:1; padding:64px 60px; display:flex; flex-direction:column; align-items:center; position:relative; z-index:1; }
  .hero-inner{ width:100%; max-width:600px; }

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--border);
    padding:6px 14px; border-radius:999px; font-size:12.5px; color:var(--text-secondary); font-weight:700; margin-bottom:22px;
  }
  .eyebrow .step-num{ color:var(--primary); font-family:'Cairo'; font-weight:800; }

  h1{ font-size:44px; font-weight:800; line-height:1.25; margin-bottom:14px; text-align:center; }
  h1 .mark{ position:relative; white-space:nowrap; }
  h1 .mark::after{ content:""; position:absolute; right:-3px; left:-3px; bottom:2px; height:13px; background:var(--accent); z-index:-1; border-radius:3px; transform:rotate(-1deg); }
  .subtitle{ font-size:16px; color:var(--text-secondary); line-height:1.8; max-width:440px; margin:0 auto 40px auto; text-align:center; }

  /* ============ UPLOAD CARD ============ */
  .upload-card{
    background:var(--white);
    border:1.5px dashed var(--secondary);
    border-radius:28px;
    padding:56px 40px 40px 40px;
    text-align:center;
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer;
    position:relative;
    transition:border-color .2s ease, background .2s ease, transform .15s ease;
  }
  .upload-card:hover{ border-color:var(--primary); background:var(--purple-light); }
  .upload-card.drag{ border-color:var(--primary); background:var(--accent-light); transform:scale(1.01); }
  .upload-card:focus-visible{ outline:2px solid var(--primary); outline-offset:4px; }

  /* icon cluster — floating document chips around a central upload badge */
  .icon-cluster{ position:relative; width:132px; height:104px; margin-bottom:26px; }

  .doc-chip{
    position:absolute; width:52px; height:66px; border-radius:10px;
    background:var(--purple-light); border:1.5px solid var(--secondary);
    padding:9px 8px;
  }
  .doc-chip .ln{ height:4px; border-radius:2px; background:var(--secondary); margin-bottom:5px; }
  .doc-chip .ln:nth-child(2){ width:70%; }
  .doc-chip .ln:nth-child(3){ width:85%; }
  .doc-chip .badge{
    position:absolute; top:-6px; left:-6px; width:18px; height:18px; border-radius:50%;
    background:var(--success); display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 3px var(--white);
  }
  .doc-chip .badge svg{ width:9px; height:9px; stroke:var(--white); }

  .doc-chip.a{ top:2px; right:6px; transform:rotate(-10deg); }
  .doc-chip.b{ top:8px; left:4px; transform:rotate(8deg); background:var(--white); }

  @media (prefers-reduced-motion:no-preference){
    .doc-chip.a{ animation: float-a 4.5s ease-in-out infinite; }
    .doc-chip.b{ animation: float-b 5.2s ease-in-out infinite; }
  }
  @keyframes float-a{ 0%,100%{ transform:rotate(-10deg) translateY(0); } 50%{ transform:rotate(-7deg) translateY(-6px); } }
  @keyframes float-b{ 0%,100%{ transform:rotate(8deg) translateY(0); } 50%{ transform:rotate(5deg) translateY(-5px); } }

  .upload-badge{
    position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:64px; height:64px; border-radius:20px;
    background:linear-gradient(150deg, var(--primary), var(--secondary));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 24px -10px rgba(211,160,253,.6);
    transition:transform .2s ease;
  }
  .upload-card:hover .upload-badge{ transform:translateX(-50%) translateY(-3px); }
  .upload-badge svg{ width:28px; height:28px; }

  .up-title{ font-size:17px; font-weight:700; margin-bottom:6px; }
  .up-title .accent-text{ color:var(--primary); }
  .up-sub{ font-size:13px; color:var(--text-muted); margin-bottom:20px; }

  .chip-row{ display:flex; gap:8px; }
  .filetype-chip{
    font-size:12px; font-weight:700; color:var(--text-secondary);
    background:var(--purple-light); border:1px solid var(--border);
    padding:6px 14px; border-radius:999px;
  }

  .upload-card.success{ border-style:solid; border-color:var(--success); background:var(--accent-light); }
  .upload-card.success .upload-badge{ background:linear-gradient(150deg, var(--success), #B7E3AD); }

  input[type="file"]{ display:none; }

  @media (max-width:900px){
    .app{ flex-direction:column; }
    aside{ width:100%; border-left:none; border-bottom:1px solid var(--border); }
    main{ padding:36px 20px; }
    h1{ font-size:32px; }
    .upload-card{ padding:40px 24px 32px 24px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="blob"></div>

  <aside>
    <div>
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21 3L2 10.5l6.5 2.5m12.5-10l-4 17.5-8-7.5m12-10L10.5 15" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="brand-name">CareerPilot</div>
      </div>

      <nav>
        <a class="nav-item" href="#">
          <span class="nav-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            مسميات وظيفية
          </span>
        </a>
        <a class="nav-item" href="#">
          <span class="nav-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            البحث عن وظائف
          </span>
        </a>
        <a class="nav-item" href="#">
          <span class="nav-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.5l2.3 2.3L16 10"/></svg>
            تقييم التوافق
          </span>
        </a>
        <a class="nav-item active" href="#">
          <span class="nav-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2l2 5 5 .8-3.6 3.5.9 5.2L12 14l-4.3 2.5.9-5.2L5 7.8 10 7z"/></svg>
            تحسين السيرة (ATS)
          </span>
          <span class="active-dot"></span>
        </a>
        <a class="nav-item" href="#">
          <span class="nav-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
            خطاب تقديم
          </span>
        </a>
      </nav>
    </div>

    <div class="progress-card">
      <div class="progress-top">
        <span class="label">رحلة الطلبات</span>
        <span class="count">0/6</span>
      </div>
      <div class="progress-sub">أكمل 6 طلبات لفتح تقرير أداء سيرتك الذاتية</div>
      <div class="progress-track"><div class="progress-fill"></div></div>
    </div>
  </aside>

  <main>
    <div class="hero-inner">
      <div class="eyebrow" style="display:flex; margin:0 auto 22px auto; width:fit-content;"><span class="step-num">١</span> من ٦ — رفع السيرة الذاتية</div>

      <h1>ابدأ <span class="mark">رحلتك المهنية</span></h1>
      <p class="subtitle">ارفع سيرتك الذاتية لتفعيل كل الخدمات — من تقييم التوافق إلى خطاب التقديم، في مكان واحد.</p>

      <label class="upload-card" id="uploadCard" tabindex="0">
        <input type="file" accept="application/pdf" id="fileInput">

        <div class="icon-cluster">
          <div class="doc-chip a">
            <div class="ln"></div><div class="ln"></div><div class="ln"></div>
            <div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
          </div>
          <div class="doc-chip b">
            <div class="ln"></div><div class="ln"></div><div class="ln"></div>
          </div>
          <div class="upload-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0L7 9m5-5l5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          </div>
        </div>

        <div class="up-title" id="upTitle">اسحب ملف <span class="accent-text">PDF</span> هنا أو اضغط لاختياره</div>
        <div class="up-sub" id="upSub">الحد الأقصى 200 ميغابايت</div>

        <div class="chip-row">
          <span class="filetype-chip">PDF</span>
          <span class="filetype-chip">حتى 200MB</span>
        </div>
      </label>
    </div>
  </main>
</div>

<script>
  const uploadCard = document.getElementById('uploadCard');
  const fileInput = document.getElementById('fileInput');
  const upTitle = document.getElementById('upTitle');
  const upSub = document.getElementById('upSub');

  ['dragenter','dragover'].forEach(evt=>{
    uploadCard.addEventListener(evt, e=>{ e.preventDefault(); uploadCard.classList.add('drag'); });
  });
  ['dragleave'].forEach(evt=>{
    uploadCard.addEventListener(evt, e=>{ e.preventDefault(); uploadCard.classList.remove('drag'); });
  });
  uploadCard.addEventListener('drop', e=>{
    e.preventDefault();
    uploadCard.classList.remove('drag');
    const files = e.dataTransfer.files;
    if(files && files.length){ fileInput.files = files; handleFile(files[0]); }
  });
  uploadCard.addEventListener('keydown', e=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); fileInput.click(); }
  });
  fileInput.addEventListener('change', ()=>{
    if(fileInput.files.length){ handleFile(fileInput.files[0]); }
  });

  function handleFile(file){
    uploadCard.classList.add('success');
    upTitle.innerHTML = 'تم اختيار <span class="accent-text">' + file.name + '</span>';
    upSub.textContent = 'اضغط للمتابعة أو اختر ملفًا آخر';
  }
</script>

</body>
</html>
